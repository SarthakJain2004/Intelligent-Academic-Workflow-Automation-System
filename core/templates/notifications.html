<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Academic Workflow</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Outfit for headings, Inter for body -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            padding: 50px 20px;
            /* Subtle dotted background pattern for a premium SaaS look */
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .notification-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* TOP ACTIONS */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 10px 18px;
            border-radius: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: #bfdbfe;
            background: var(--primary-soft);
            transform: translateX(-4px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.08);
        }

        .mark-read-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.95rem;
            transition: opacity 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .mark-read-btn:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        /* PAGE HEADER */
        .page-title-group {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .badge-count {
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
        }

        /* NOTIFICATION CARDS */
        .notification-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        /* Subtle animated left border on hover */
        .notification-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            border-radius: 4px 0 0 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .notification-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.08);
        }

        .notification-card:hover::before {
            opacity: 1;
        }

        /* ICON WRAPPER */
        .icon-wrapper {
            width: 54px;
            height: 54px;
            background: var(--primary-soft);
            color: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            position: relative;
        }

        /* Pulsing unread dot */
        .unread-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background-color: #ef4444; /* Red accent */
            border: 2px solid var(--bg-card);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* CONTENT */
        .notification-content {
            flex-grow: 1;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .notification-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        .notification-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notification-message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            border: 2px dashed var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.01);
            margin-top: 20px;
        }

        .empty-icon {
            font-size: 64px;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: inline-block;
        }

        .empty-state h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <div class="notification-container">
        
        <!-- Header Actions -->
        <div class="header-actions">
            <a href="/dashboard/" class="back-btn">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <!-- Title and Badge -->
        <div class="page-title-group">
            <h1 class="page-title">Notifications</h1>
            <span class="badge-count">{{ data|length }} New</span>
        </div>

        <!-- Notification List -->
        {% for n in data %}
            <div class="notification-card">
                <div class="icon-wrapper">
                    <i class="bi bi-bell"></i>
                    {% if forloop.first %}
                    <span class="unread-dot"></span>
                    {% endif %}
                </div>
                <div class="notification-content">
                    <div class="notification-header">
                        <h5 class="notification-title">{{ n.title }}</h5>
                        <div class="notification-time">
                            <i class="bi bi-clock"></i> {{ n.created_at|timesince }} ago
                        </div>
                    </div>
                    <p class="notification-message">{{ n.message }}</p>
                </div>
            </div>
        {% empty %}
            <!-- Empty State -->
            <div class="empty-state">
                <i class="bi bi-bell-slash empty-icon"></i>
                <h3>You're all caught up!</h3>
                <p>There are no new notifications or alerts at this moment.</p>
            </div>
        {% endfor %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - Academic Workflow</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Outfit for headings, Inter for body -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #0072ff;
            --primary-soft: #e6f1ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-page: #f5f7fa;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --warning: #f59e0b;
            --warning-soft: #fef3c7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            padding: 50px 20px;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* HEADER ACTIONS */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 10px 18px;
            border-radius: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: #bfdbfe;
            background: var(--primary-soft);
            transform: translateX(-4px);
            box-shadow: 0 6px 15px rgba(0, 114, 255, 0.08);
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* ASSIGNMENT CARD */
        .assignment-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .assignment-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            border-radius: 4px 0 0 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .assignment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
        }

        .assignment-card:hover::before {
            opacity: 1;
        }

        .assignment-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .assignment-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-soft);
            color: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .assignment-details {
            flex-grow: 1;
        }

        .assignment-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .assignment-deadline {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #d97706; /* Dark orange */
            background: var(--warning-soft);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* UPLOAD SECTION */
        .upload-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 1px dashed #cbd5e1;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px;
            display: block;
        }

        .form-control[type="file"] {
            background: #ffffff;
            border-color: #cbd5e1;
            padding: 10px 15px;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control[type="file"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        /* Customizing the "Choose File" button inside the input */
        .form-control[type="file"]::file-selector-button {
            background: var(--primary-soft);
            color: var(--primary);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            margin-right: 15px;
            font-weight: 500;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .form-control[type="file"]::file-selector-button:hover {
            background: #dbeafe;
        }

        /* BUTTON */
        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: #005bb5;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 114, 255, 0.25);
            color: white;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 2px dashed var(--border-color);
            color: var(--text-muted);
            margin-top: 20px;
        }

        .empty-state i {
            font-size: 50px;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: inline-block;
        }

        .empty-state h5 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">

        <div class="header-actions">
            <a href="/dashboard/" class="back-btn">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="page-header">
            <h1 class="page-title">Pending Assignments</h1>
            <p class="page-subtitle">Submit your course work and keep track of upcoming deadlines.</p>
        </div>

        {% for a in assignments %}
        <div class="assignment-card">
            
            <div class="assignment-header">
                <div class="assignment-icon">
                    <i class="bi bi-journal-text"></i>
                </div>
                <div class="assignment-details">
                    <h5 class="assignment-title">{{ a.title }}</h5>
                    <div class="assignment-deadline">
                        <i class="bi bi-clock-history"></i> Due: {{ a.deadline }}
                    </div>
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" action="/submit/{{ a.id }}/">
                {% csrf_token %}
                
                <div class="upload-section mb-4">
                    <label class="form-label">
                        <i class="bi bi-cloud-arrow-up text-primary me-2"></i>Upload Your Work
                    </label>
                    <input class="form-control" type="file" name="file" required>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-send-fill"></i> Submit Assignment
                    </button>
                </div>
            </form>

        </div>
        {% empty %}
        <div class="empty-state">
            <i class="bi bi-check2-circle text-success" style="font-size: 60px; color: #10b981 !important;"></i>
            <h5>All Caught Up!</h5>
            <p>You have no pending assignments to submit at this time.</p>
        </div>
        {% endfor %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

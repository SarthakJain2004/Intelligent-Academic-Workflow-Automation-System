<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intelligent Academic Workflow System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #0f172a;
            --accent: #38bdf8;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            overflow: hidden; /* For the split layout */
        }

        /* SPLIT LAYOUT */
        .split-left {
            flex: 1.2;
            background: linear-gradient(135deg, var(--secondary) 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            color: white;
            overflow: hidden;
        }

        .split-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            padding: 2rem;
            position: relative;
        }

        /* LEFT SIDE GRAPHICS */
        .left-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        .brand-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .brand-badge i {
            color: var(--accent);
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* Abstract shapes in background of left side */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: #4338ca;
            top: -100px;
            left: -100px;
            opacity: 0.5;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #0284c7;
            bottom: -50px;
            right: -50px;
            opacity: 0.4;
            animation-delay: -5s;
        }

        /* RIGHT SIDE FORM */
        .login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Role Toggle Switch */
        .role-switch {
            display: flex;
            background: var(--bg-light);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 32px;
            position: relative;
            border: 1px solid #e2e8f0;
        }

        .role-switch input {
            display: none;
        }

        .role-switch label {
            flex: 1;
            text-align: center;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .role-switch .slider {
            position: absolute;
            top: 6px;
            bottom: 6px;
            left: 6px;
            width: calc(50% - 6px);
            background: var(--surface);
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        #faculty:checked ~ .slider {
            transform: translateX(100%);
        }

        #student:checked ~ label[for="student"],
        #faculty:checked ~ label[for="faculty"] {
            color: var(--text-main);
        }

        /* Modern Inputs */
        .input-group-custom {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group-custom label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .form-control-custom {
            width: 100%;
            background: var(--surface);
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .form-control-custom:focus + i {
            color: var(--primary);
        }

        .form-control-custom::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        /* Premium Button */
        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            margin-top: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Error Message */
        .error-alert {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 20px); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Responsive */
        @media (max-width: 992px) {
            .split-left {
                display: none;
            }
            .split-right {
                background: #f8fafc;
            }
            .login-container {
                background: white;
                padding: 40px;
                border-radius: 24px;
                box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            }
        }
    </style>
</head>
<body>

    <!-- Left Side: Branding & Graphics -->
    <div class="split-left">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        
        <div class="left-content">

            <div class="logo-container" style="margin-bottom: 2rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="url(#logoGrad)" />
                    <path d="M24 14L14 19V29L24 34L34 29V19L24 14Z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
                    <path d="M24 14L24 34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M14 19L24 24L34 19" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#38bdf8"/>
                            <stop offset="1" stop-color="#2563eb"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="hero-title">Academic<br>Workflow<br>Automation.</h1>
            <p class="hero-subtitle">Experience a seamless, intelligent, and highly optimized environment for managing academic operations, attendance, marks, and assignments with precision.</p>
            

        </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="split-right">
        <div class="login-container">
            <div class="login-header">
                <h2 class="login-title">Welcome back</h2>
                <p class="login-subtitle">Please enter your details to sign in.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="role-switch">
                    <input type="radio" id="student" name="role" value="student" checked>
                    <input type="radio" id="faculty" name="role" value="faculty">
                    <div class="slider"></div>
                    <label for="student">Student</label>
                    <label for="faculty">Faculty</label>
                </div>

                <div class="input-group-custom">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-control-custom" id="username" name="username" placeholder="Enter your username" required>
                        <i class="bi bi-person"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-control-custom" id="password" name="password" placeholder="••••••••" required>
                        <i class="bi bi-shield-lock"></i>
                    </div>
                </div>



                <button type="submit" class="btn-login">
                    Sign In
                </button>
            </form>

            {% if error %}
                <div class="error-alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>{{ error }}</span>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>

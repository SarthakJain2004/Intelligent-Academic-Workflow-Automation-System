<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Notification - Academic Workflow</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #6c757d;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #0072ff;
        }

        /* CARD */
        .card-box {
            background: #ffffff;
            max-width: 550px;
            width: 100%;
            border-radius: 16px;
            padding: 40px 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }

        .page-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* INPUTS */
        .form-label {
            font-weight: 500;
            font-size: 0.95rem;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
            padding-left: 15px;
            padding-right: 12px;
            border-radius: 10px 0 0 10px;
            border-color: #e2e8f0;
        }

        .form-control {
            border-left: none;
            background-color: #ffffff;
            padding: 12px 15px 12px 5px;
            border-radius: 0 10px 10px 0;
            border-color: #e2e8f0;
            color: #2d3748;
        }

        /* Textarea specific */
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }
        
        .textarea-group .input-group-text {
            align-items: flex-start;
            padding-top: 15px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #cbd5e0;
        }

        /* Focus styling for input group */
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #0072ff;
            box-shadow: 0 0 0 0.25rem rgba(0, 114, 255, 0.1);
        }

        /* BUTTON */
        .btn-primary {
            background-color: #0072ff;
            border-color: #0072ff;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background-color: #005bb5;
            border-color: #005bb5;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 114, 255, 0.25);
        }

        /* Character Count */
        .char-count {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: #a0aec0;
            margin-top: 6px;
        }

        /* Messages */
        .messages {
            margin-bottom: 25px;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.95rem;
            border: none;
        }
        .alert-success {
            background-color: #e6faed;
            color: #00c853;
        }
    </style>
</head>
<body>

    <a href="/faculty/" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Panel
    </a>

    <div class="card-box">
        <h2 class="page-title">Post Notification</h2>
        <p class="page-subtitle">Send announcements to students directly</p>

        <!-- Django Messages -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Title Input -->
            <div class="mb-4">
                <label class="form-label">Notification Title</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-pencil-square"></i></span>
                    <input type="text" name="title" class="form-control" placeholder="e.g., Upcoming Midterm Exam" required>
                </div>
            </div>

            <!-- Message Textarea -->
            <div class="mb-4">
                <label class="form-label">Message Details</label>
                <div class="input-group textarea-group">
                    <span class="input-group-text"><i class="bi bi-chat-text"></i></span>
                    <textarea name="message" id="messageInput" class="form-control" placeholder="Write your announcement here..." maxlength="500" required></textarea>
                </div>
                <span class="char-count" id="charCount">0 / 500 characters</span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-send-fill"></i> Post Notification
            </button>
        </form>
    </div>

    <!-- Character limit script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messageInput = document.getElementById('messageInput');
            const charCount = document.getElementById('charCount');
            const maxLength = messageInput.getAttribute('maxlength');

            messageInput.addEventListener('input', function() {
                const currentLength = this.value.length;
                charCount.textContent = `${currentLength} / ${maxLength} characters`;
                
                if (currentLength >= maxLength) {
                    charCount.style.color = '#e53e3e'; // Red warning
                } else {
                    charCount.style.color = '#a0aec0'; // Normal gray
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Academic Workflow</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #6c757d;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #0072ff;
        }

        /* CARD */
        .card-box {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }

        .page-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* INPUTS */
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
            padding-left: 15px;
            padding-right: 10px;
        }

        .form-select {
            border-left: none;
            background-color: #ffffff;
            padding-left: 5px;
        }

        .form-select:focus {
            box-shadow: none;
            border-color: #ced4da;
        }

        /* Focus styling for input group */
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-select {
            border-color: #0072ff;
            box-shadow: 0 0 0 0.25rem rgba(0, 114, 255, 0.15);
        }

        /* BUTTON */
        .btn-primary {
            background-color: #0072ff;
            border-color: #0072ff;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-primary:hover {
            background-color: #005bb5;
            border-color: #005bb5;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 114, 255, 0.25);
        }

        /* Messages */
        .messages {
            margin-bottom: 20px;
        }
        .alert {
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <a href="/faculty/" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Panel
    </a>

    <div class="card-box">
        <h2 class="page-title">Mark Attendance</h2>
        <p class="page-subtitle">Record student attendance efficiently</p>

        <!-- Django Messages -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Student Select -->
            <div class="mb-3">
                <label class="form-label">Student</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <select name="student" class="form-select" required>
                        <option value="" disabled selected>Select Student...</option>
                        {% for s in students %}
                            <option value="{{ s.id }}">{{ s.user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Subject Select -->
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <div class="input-group">
                    <span class="input-group-text">📘</span>
                    <select name="subject" class="form-select" required>
                        <option value="" disabled selected>Select Subject...</option>
                        {% for s in subjects %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Status Select -->
            <div class="mb-4">
                <label class="form-label">Status</label>
                <div class="input-group">
                    <span class="input-group-text">✔️</span>
                    <select name="status" class="form-select" required>
                        <option value="present" selected>Present</option>
                        <option value="absent">Absent</option>
                    </select>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100">
                Save Attendance
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
